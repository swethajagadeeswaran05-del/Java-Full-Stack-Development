<html>
    <body>
        <h1>Functions with Return Values</h1>
        <h2> Add Two Numbers</h2>
        <input type="text" id="num1" placeholder="Enter first number">
        <input type="text" id="num2" placeholder="Enter second number">
        <button onclick="displaySum()">Add</button>
        <p id="result"></p>
        <script>
            function addNumbers(number1, number2) {
                var sum = number1 + number2;
                return sum;
            }

            function displaySum() {
                var number1 = parseFloat(document.getElementById('num1').value);
                var number2 = parseFloat(document.getElementById('num2').value);
                var sum = addNumbers(number1, number2);
                document.getElementById('result').innerText = "The sum is: " + sum;
            }
            
        </script>
    </body>
</html>

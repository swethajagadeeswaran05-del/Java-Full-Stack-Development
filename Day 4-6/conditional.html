<html>
<body>
    <button onclick="handleclick()">click me</button>
    <h1 style="color:#8ff806" id="res"></h1>
    <script>
        function handleclick() {
            let x=200
            if(x>=10 && x<=50){
                 console.log("Its between 10 and 50")
                 document.getElementById("res").textContent="Its between 10 and 50"
            }else if(x>50 && x<=100){
                console.log("x is between 50 and 100")
                document.getElementById("res").textContent="x is between 50 and 100"
            }else if(x>100){
                console.log("x is greater than 100")
                document.getElementById("res").textContent="x is greater than 100"
            }else{
                console.log("x is less than 10")
                document.getElementById("res").textContent="x is less than 10"
            }
        }
        
    </script>
</body>
</html>

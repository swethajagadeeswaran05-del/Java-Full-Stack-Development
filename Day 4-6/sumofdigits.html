<html>
    <body>
        <input type="number" id="num1"placeholder="Enter a number1">
        <input type="number" id="num2"placeholder="Enter a number2">
        <button onclick="sumofdigits()">Sum of digits</button>
        <h1 id="res" style="color:rgb(189, 20, 231); font-family:Arial, sans-serif;font-size:120px;"></h1>
        <script>
            function sumofdigits(){
                let num1=document.getElementById("num1").value
                let num2=document.getElementById("num2").value
                let sum=0
                let add=Number(num1) + Number(num2)
                while(add>0){
                    let digit=add%10
                    sum+=digit
                    add=Math.floor(add/10)
                }
                if(sum%2==0){
                     document.getElementById("res").textContent="Even"
                }else{
                     document.getElementById("res").textContent="Odd"
                }
            }
        </script>
    </body>
</html>

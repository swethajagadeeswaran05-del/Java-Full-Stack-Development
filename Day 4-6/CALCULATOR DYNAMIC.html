<html>
    <body>
        <h1> Calculator </h1>
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <button onclick="add()">Add</button>
        <button onclick="subtract()">Subtract</button>
        <button onclick="multiply()">Multiply</button>
        <button onclick="divide()">Divide</button>
        <button onclick="mod()">Modulo</button>
        <p id="result"></p>
            </body>
        <script>
            function add(){
                let n1=document.getElementById("num1").value;
                let n2=document.getElementById("num2").value;
                let sum=Number(n1)+Number(n2);
                document.getElementById("result").textContent="Addition is "+sum;
            }
            function subtract(){
                let n1=document.getElementById("num1").value;
                let n2=document.getElementById("num2").value;
                let difference=Number(n1)-Number(n2);
                document.getElementById("result").textContent="Subtraction is "+difference;
            }
             function multiply(){
                let n1=document.getElementById("num1").value;
                let n2=document.getElementById("num2").value;
                let product=Number(n1)*Number(n2);
                document.getElementById("result").textContent="Multiplication is "+product;
            }
             function divide(){
                let n1=document.getElementById("num1").value;
                let n2=document.getElementById("num2").value;
                if(Number(n2)===0){
                    document.getElementById("result").textContent="Division by zero is not allowed";
                }
                else{
                    let quotient=Number(n1)/Number(n2);
                    document.getElementById("result").textContent="Division is "+quotient;
                }
            }
            function mod(){
                let n1=document.getElementById("num1").value;
                let n2=document.getElementById("num2").value;
                if(Number(n2)===0){
                    document.getElementById("result").textContent="Modulo by zero is not allowed";
                }
                else{
                    let remainder=Number(n1)%Number(n2);
                    document.getElementById("result").textContent="Modulo is "+remainder;
                }
            }
        </script>
</html>

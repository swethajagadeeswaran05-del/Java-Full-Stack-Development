<html>
<head>
<style>
.container {
  display:flex;
  background-color: dodgerblue;
  justify-content: space-between;
}
.container div {
  background-color: #f1f1f1;
  border: 1px solid black;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}
</style>
</head>
<body>

<div class="container">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
</div>
<style>

.container1 {
  display: grid;
  grid-template-columns: auto auto auto;
  background-color: rgb(255, 30, 161);
  gap: 10px;
  padding: 10px;
}

.container1 div {
  background-color: #f1f1f1;
  border: 1px solid rgb(0, 0, 0);
  padding: 10px;
  font-size: 30px;
  text-align: center;
}

</style>
</head>
<body>

<div class="container1">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
</div>

</body>
</html>

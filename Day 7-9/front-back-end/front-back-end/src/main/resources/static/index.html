<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scientific Calculator</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: rgb(244 18 225 / 0.78);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 400px;
        text-align: center;
    }
    h2 {
        color: #333;
    }
    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }
    input {
        width: 90%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }
    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        background-color: #007bff;
        color: white;
        font-size: 14px;
    }
    #result {
        color: #28a745;
        margin-top: 20px;
        font-size: 24px;
    }
</style>
</style>
<body>
<div class="container">
<h2>Addition</h2>
<label>First Number:</label>
<input type="number" id="num1" placeholder="Enter First Number">
<label>Second Number:</label>
<input type="number" id="num2" placeholder="Enter Second Number">
<button onclick="add()">Add</button>
<h2>Scientific Functions</h2>
<label>Angle (in Degrees):</label>
<input type="number" id="angle" placeholder="Enter Angle">
<button onclick="sinValue()">Sin</button>
<button onclick="cosValue()">Cos</button>
<button onclick="tanValue()">Tan</button>
<button onclick="logValue()">Log</button>
    <button onclick="spiralMatrix()">Spiral Matrix</button>
    <br>
<h1 id="result"></h1>
</div>
<script>
    async function add() {
        let num1 = document.getElementById("num1").value;
        let num2 = document.getElementById("num2").value;
        const response = await fetch(`http://localhost:8080/calc/add/${num1}/${num2}`);
        const text = await response.text();
        document.getElementById("result").innerText = text;
    }
    async function sinValue() {
        let angle = document.getElementById("angle").value;
        const response = await fetch(`http://localhost:8080/calc/sin/${angle}`);
        const text = await response.text();
        document.getElementById("result").innerText = text;
    }
    async function cosValue() {
        let angle = document.getElementById("angle").value;
        const response = await fetch(`http://localhost:8080/calc/cos/${angle}`);
        const text = await response.text();
        document.getElementById("result").innerText = text;
    }
    async function tanValue() {
        let angle=document.getElementById("angle").value;
        const response =await fetch(`http://localhost:8080/calc/tan/${angle}`);
        const text =await response.text();
        document.getElementById("result").innerText = text;
    }
    async function logValue() {
        let angle = document.getElementById("angle").value;
        const response = await fetch(`http://localhost:8080/calc/log/${angle}`);
        const text = await response.text();
        document.getElementById("result").innerText = text;
    }
    async function spiralMatrix() {
        const response = await fetch("http://localhost:8080/calc/spiral");
        const text = await response.text();
        document.getElementById("result").innerText = text;
    }
</script>
</body>
</html>
